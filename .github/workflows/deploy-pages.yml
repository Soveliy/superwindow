name: Deploy GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build
        env:
          VITE_API_BASE_URL: ''
          VITE_DEV_AUTH_ENABLED: 'true'
          VITE_DEV_AUTH_LOGIN: 'demo'
          VITE_DEV_AUTH_PASSWORD: 'demo123'
          VITE_DEV_AUTH_DEALER_ID: 'DEV-0001'

      - name: Add GitHub Pages fallback page
        run: |
          OWNER_NAME="${GITHUB_REPOSITORY%%/*}"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [ "${REPO_NAME,,}" = "${OWNER_NAME,,}.github.io" ]; then
            BASE_PATH=""
          else
            BASE_PATH="/${REPO_NAME}"
          fi
          cat > dist/404.html <<EOF
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Redirecting...</title>
              <script>
                (function () {
                  var basePath = "${BASE_PATH}";
                  var routePath = window.location.pathname.slice(basePath.length) || "/";
                  var query = window.location.search || "";
                  var hash = window.location.hash || "";
                  window.location.replace(basePath + "/#" + routePath + query + hash);
                })();
              </script>
            </head>
            <body></body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
